<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Illumios Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.1.2/dist/gridstack.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* Gate styles (keep self-contained so gate works even if styles.css fails) */
    #gate {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #0E0D0D;
    }
    #gate-box {
      background: #1A1919; border: 1px solid rgba(242,101,34,0.25);
      border-radius: 16px; padding: 48px 40px; width: 360px; text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    #gate-box .logo-wrap { margin-bottom: 28px; }
    #gate-box h2 { font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700; color: rgba(242,237,232,0.5); margin-bottom: 8px; letter-spacing: 0.08em; text-transform: uppercase; }
    #gate-box p { font-family: 'Nunito', sans-serif; font-size: 0.82rem; color: rgba(242,237,232,0.4); margin-bottom: 28px; }
    #g-signin-btn { display: flex; justify-content: center; }
    #gate-error { font-family: 'Nunito', sans-serif; color: #ef4444; font-size: 0.82rem; margin-top: 14px; min-height: 1.2em; }
    #dashboard { display: none; }
  </style>
</head>
<body>

<!-- SIGN-IN GATE -->
<div id="gate">
  <div id="gate-box">
    <div class="logo-wrap">
      <svg width="180" height="36" viewBox="0 0 220 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="28" font-family="Nunito, sans-serif" font-weight="800" font-size="28" fill="#FAF7F2">illumios</text>
        <polygon points="200,4 210,14 200,24 190,14" fill="#F26522"/>
        <polygon points="200,8 207,14 200,20 193,14" fill="#FAF7F2" opacity="0.9"/>
      </svg>
    </div>
    <h2>Mission Control</h2>
    <p>Sign in with your illumios.com Google account</p>
    <div id="g-signin-btn"></div>
    <div id="gate-error" role="alert"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="dashboard">

  <aside id="sidebar">
    <div class="sidebar-brand">
      <svg width="130" height="26" viewBox="0 0 200 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="25" font-family="Nunito, sans-serif" font-weight="800" font-size="24" fill="#FAF7F2">illumios</text>
        <polygon points="180,2 190,12 180,22 170,12" fill="#F26522"/>
        <polygon points="180,6 187,12 180,18 173,12" fill="#FAF7F2" opacity="0.85"/>
      </svg>
    </div>

    <nav id="sidebar-nav" aria-label="Primary navigation"></nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">S</div>
        <div class="user-details">
          <div class="user-email" id="user-email">—</div>
          <div class="user-role">Team</div>
        </div>
      </div>
      <button class="sign-out-btn" id="sign-out-btn" onclick="signOut()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <div id="app-main">
    <header id="topbar">
      <div class="topbar-left">
        <h1 id="page-title">Home</h1>
        <span class="date-chip" id="nav-date"></span>
      </div>
      <div class="topbar-right">
        <span class="phase-badge" id="phase-badge">Offer Launch — Academia</span>
        <button class="customize-btn" id="customize-btn" style="display:none">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Customize
        </button>
      </div>
    </header>

    <div id="view"></div>
  </div>

</div>

<!-- Gridstack (must load before ES modules so window.GridStack is available) -->
<script src="https://cdn.jsdelivr.net/npm/gridstack@10.1.2/dist/gridstack-all.js"></script>

<script>
// ============================================================
// AUTH — VERBATIM FROM WORKING VERSION. DO NOT MODIFY.
// ============================================================
const AUTH_KEY     = 'mc_auth';
const TASKS_KEY    = 'mc_tasks';
const LOGS_KEY     = 'mc_logs';
const CLIENT_ID    = '278545755272-2lq117irlb0bnc6t4ggp29p8dkq8v1kq.apps.googleusercontent.com';
const ALLOWED_DOMAIN = 'illumios.com';

function decodeJwtPayload(token) {
  const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  const json = atob(base64.padEnd(base64.length + (4 - base64.length % 4) % 4, '='));
  return JSON.parse(json);
}

function handleCredentialResponse(response) {
  const payload = decodeJwtPayload(response.credential);
  const email = payload.email || '';
  const hd    = payload.hd   || '';

  if (hd !== ALLOWED_DOMAIN && !email.endsWith('@' + ALLOWED_DOMAIN)) {
    document.getElementById('gate-error').textContent =
      'Access restricted to @' + ALLOWED_DOMAIN + ' accounts. Signed in as: ' + email;
    google.accounts.id.disableAutoSelect();
    return;
  }

  localStorage.setItem(AUTH_KEY, JSON.stringify({ email, exp: payload.exp }));
  showDashboard(email);
}

function isSessionValid() {
  try {
    const raw = localStorage.getItem(AUTH_KEY);
    if (!raw) return false;
    const { exp } = JSON.parse(raw);
    return Date.now() / 1000 < exp;
  } catch { return false; }
}

function signOut() {
  google.accounts.id.disableAutoSelect();
  localStorage.removeItem(AUTH_KEY);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('gate-error').textContent = '';
}

window.addEventListener('DOMContentLoaded', () => {
  if (isSessionValid()) {
    const { email } = JSON.parse(localStorage.getItem(AUTH_KEY));
    showDashboard(email);
    return;
  }
  const tryInit = () => {
    if (typeof google !== 'undefined' && google.accounts) {
      initGoogleSignIn();
    } else {
      setTimeout(tryInit, 100);
    }
  };
  tryInit();
});

function initGoogleSignIn() {
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredentialResponse,
    auto_select: false,
  });
  google.accounts.id.renderButton(
    document.getElementById('g-signin-btn'),
    { theme: 'filled_black', size: 'large', shape: 'rectangular', text: 'signin_with', width: 280 }
  );
}

// ============================================================
// BRIDGE — Only change: call initModularApp instead of old inits
// ============================================================
function showDashboard(email) {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  if (window.initModularApp) {
    window.initModularApp(email);
  }
}
</script>

<script type="module" src="app.js"></script>
</body>
</html>
